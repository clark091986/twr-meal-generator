<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fridge-to-Meal Generator | The Thriving Woman Reset</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #2C2C3E;
    --gold: #B8976A;
    --sand: #F5EDE3;
    --warm-white: #FAFAF8;
    --light-gold: #D4B896;
    --text-dark: #1a1a2e;
    --text-mid: #6b6b7b;
    --text-light: #9a9aaa;
    --border: rgba(184,151,106,0.2);
    --border-strong: rgba(184,151,106,0.4);
    --success: #4a7c59;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-white);
    color: var(--text-dark);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    background: var(--navy);
    padding: 2rem 1.5rem 1.5rem;
    text-align: center;
  }
  .brand-eyebrow {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--light-gold);
    text-transform: uppercase;
    font-weight: 400;
    margin-bottom: 6px;
  }
  .brand-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(28px, 6vw, 40px);
    font-weight: 400;
    color: var(--warm-white);
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .brand-title em { color: var(--gold); font-style: italic; }
  .brand-sub {
    font-size: 13px;
    color: var(--light-gold);
    font-weight: 300;
    letter-spacing: 0.5px;
  }
  .tagline-strip {
    background: var(--gold);
    padding: 8px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--navy);
    text-transform: uppercase;
    font-weight: 500;
  }

  /* ── Main layout ── */
  main { max-width: 680px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

  /* ── Form cards ── */
  .form-card {
    background: #fff;
    border: 0.5px solid var(--border-strong);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }
  .form-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 2px;
    display: block;
    margin-bottom: 10px;
  }
  .ingredient-input {
    width: 100%;
    border: 0.5px solid var(--border-strong);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-dark);
    background: var(--warm-white);
    resize: none;
    min-height: 90px;
    line-height: 1.6;
    transition: border-color 0.2s;
  }
  .ingredient-input:focus { outline: none; border-color: var(--gold); }
  .ingredient-input::placeholder { color: var(--text-light); }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media(max-width: 520px){ .grid-2 { grid-template-columns: 1fr; } }
  .pill-row { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill {
    border: 0.5px solid var(--border-strong);
    border-radius: 20px;
    padding: 7px 15px;
    font-size: 13px;
    cursor: pointer;
    color: var(--text-mid);
    background: #fff;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    line-height: 1;
  }
  .pill:hover { border-color: var(--gold); color: var(--gold); }
  .pill.on { background: var(--navy); border-color: var(--navy); color: #fff; }
  .new-tag {
    font-size: 9px;
    background: var(--gold);
    color: #fff;
    border-radius: 6px;
    padding: 2px 6px;
    margin-left: 5px;
    vertical-align: middle;
    letter-spacing: 0.5px;
  }

  /* ── Generate button ── */
  .generate-btn {
    width: 100%;
    padding: 16px;
    background: var(--navy);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.5px;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 0.5rem;
  }
  .generate-btn:hover { opacity: 0.9; }
  .generate-btn:active { transform: scale(0.99); }

  /* ── Result section ── */
  #result { display: none; margin-top: 2.5rem; }
  #result.show { display: block; }
  .result-header {
    border-left: 3px solid var(--gold);
    padding-left: 16px;
    margin-bottom: 1.25rem;
  }
  .result-eyebrow {
    font-size: 10px;
    letter-spacing: 2.5px;
    color: var(--gold);
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 5px;
  }
  .result-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(22px, 5vw, 30px);
    font-weight: 500;
    color: var(--navy);
    line-height: 1.2;
    margin-bottom: 6px;
  }
  .result-vibe {
    font-size: 14px;
    color: var(--text-mid);
    font-style: italic;
    line-height: 1.6;
  }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; margin: 1rem 0; }
  .chip {
    font-size: 12px;
    color: var(--gold);
    background: var(--sand);
    padding: 5px 13px;
    border-radius: 20px;
    font-weight: 400;
  }

  /* ── Nutrition panel ── */
  .nutrition-panel {
    background: var(--navy);
    border-radius: 16px;
    padding: 1.5rem;
    margin: 1.5rem 0;
  }
  .nutrition-panel-title {
    font-size: 10px;
    letter-spacing: 2.5px;
    color: var(--light-gold);
    text-transform: uppercase;
    font-weight: 500;
    margin-bottom: 1.25rem;
  }
  .nutrition-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
  .nutrition-item { text-align: center; }
  .nutrition-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 500;
    color: #fff;
    line-height: 1;
    margin-bottom: 4px;
  }
  .nutrition-label {
    font-size: 10px;
    color: var(--light-gold);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .nutrition-rule {
    border: none;
    border-top: 0.5px solid rgba(212,184,150,0.2);
    margin: 1.25rem 0;
  }
  .nutrition-note {
    font-size: 10px;
    color: var(--light-gold);
    opacity: 0.6;
    text-align: center;
    margin-top: 0.75rem;
  }

  /* ── Sections ── */
  .divider { border: none; border-top: 0.5px solid var(--border); margin: 1.5rem 0; }
  .section-label {
    font-size: 10px;
    font-weight: 500;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 2px;
    display: block;
    margin-bottom: 12px;
  }
  .steps-list, .ingredients-list { padding-left: 1.25rem; }
  .steps-list li, .ingredients-list li {
    font-size: 14px;
    color: var(--text-dark);
    line-height: 1.7;
    margin-bottom: 6px;
  }
  .info-box {
    background: var(--sand);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .info-box p { font-size: 13px; color: var(--text-dark); line-height: 1.7; }
  .info-box .section-label { margin-bottom: 5px; }

  /* ── Grocery list ── */
  .grocery-card {
    border: 1px solid var(--border-strong);
    border-radius: 16px;
    overflow: hidden;
    margin-top: 2rem;
  }
  .grocery-top {
    background: var(--navy);
    padding: 1.25rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }
  .grocery-top-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 500;
    color: #fff;
  }
  .grocery-top-sub { font-size: 12px; color: var(--light-gold); margin-top: 2px; }
  .grocery-hint { font-size: 11px; color: var(--light-gold); opacity: 0.8; }
  .grocery-body { padding: 1.25rem 1.5rem; background: #fff; }
  .grocery-section { margin-bottom: 1.25rem; }
  .grocery-section-name {
    font-size: 10px;
    font-weight: 500;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 2px;
    padding-bottom: 6px;
    border-bottom: 0.5px solid var(--border);
    margin-bottom: 10px;
  }
  .grocery-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    cursor: pointer;
    border-bottom: 0.5px solid rgba(184,151,106,0.08);
  }
  .grocery-item:last-child { border-bottom: none; }
  .grocery-item input[type="checkbox"] {
    accent-color: var(--navy);
    width: 17px;
    height: 17px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .grocery-item label {
    font-size: 14px;
    color: var(--text-dark);
    cursor: pointer;
    flex: 1;
    line-height: 1.4;
  }
  .grocery-item label.done {
    text-decoration: line-through;
    color: var(--text-light);
  }
  .have-badge {
    font-size: 10px;
    color: var(--success);
    background: #edf7f0;
    padding: 2px 8px;
    border-radius: 8px;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.3px;
  }
  .grocery-footer {
    border-top: 0.5px solid var(--border);
    padding: 12px 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--sand);
  }
  .progress-label { font-size: 12px; color: var(--text-mid); }
  .clear-btn {
    font-size: 12px;
    color: var(--gold);
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-weight: 500;
  }
  .clear-btn:hover { text-decoration: underline; }

  /* ── Action buttons ── */
  .actions { display: flex; gap: 10px; margin-top: 1.5rem; flex-wrap: wrap; }
  .action-btn {
    flex: 1;
    min-width: 140px;
    padding: 12px;
    border: 0.5px solid var(--gold);
    border-radius: 10px;
    background: none;
    color: var(--gold);
    font-size: 13px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    text-align: center;
    transition: background 0.15s;
  }
  .action-btn:hover { background: var(--sand); }
  .action-btn.primary {
    background: var(--navy);
    color: #fff;
    border-color: var(--navy);
  }
  .action-btn.primary:hover { opacity: 0.88; }

  /* ── No match ── */
  .no-match {
    background: var(--sand);
    border-radius: 16px;
    padding: 2rem;
    text-align: center;
  }
  .no-match p { font-size: 14px; color: var(--text-mid); line-height: 1.7; }

  /* ── Download buttons ── */
  .download-row {
    display: flex;
    gap: 10px;
    margin-top: 1rem;
    flex-wrap: wrap;
  }
  .dl-btn {
    flex: 1;
    min-width: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
    border: none;
  }
  .dl-btn-pdf {
    background: var(--navy);
    color: #fff;
  }
  .dl-btn-pdf:hover { opacity: 0.88; }
  .dl-btn-copy {
    background: var(--sand);
    color: var(--navy);
    border: 0.5px solid var(--border-strong);
  }
  .dl-btn-copy:hover { background: var(--light-gold); }
  .dl-btn svg { flex-shrink: 0; }
  .copy-confirm {
    font-size: 12px;
    color: var(--success);
    text-align: center;
    margin-top: 8px;
    height: 18px;
    transition: opacity 0.3s;
  }

  /* ── Print styles (PDF) ── */
  @media print {
    header, .tagline-strip, main > .form-card,
    main > .grid-2, main > .generate-btn,
    .result-header, .chips, .nutrition-panel,
    .divider, .section-label, .ingredients-list,
    .steps-list, .info-box, .actions,
    .download-row, .copy-confirm, footer,
    .grocery-top .grocery-hint { display: none !important; }
    body { background: #fff; font-family: 'DM Sans', sans-serif; }
    main { padding: 0; max-width: 100%; }
    #result { display: block !important; margin: 0; }
    .grocery-card {
      border: none !important;
      margin: 0 !important;
      box-shadow: none;
    }
    .grocery-top {
      background: #2C2C3E !important;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
      padding: 1rem !important;
    }
    .grocery-top-title { font-size: 18px !important; }
    .grocery-body { padding: 1rem !important; }
    .grocery-item { padding: 6px 0 !important; }
    .grocery-item input { display: none; }
    .grocery-item label::before {
      content: '☐ ';
      font-size: 14px;
    }
    .grocery-item label.done::before { content: '☑ '; }
    .grocery-footer { background: #F5EDE3 !important; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .have-badge { display: none; }
    .print-meal-title {
      font-size: 16px;
      font-weight: 500;
      color: #2C2C3E;
      padding: 0.75rem 1.5rem;
      background: #F5EDE3;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
  }

  /* ── Footer ── */
  footer {
    text-align: center;
    padding: 2rem 1rem;
    background: var(--navy);
    font-size: 11px;
    color: var(--light-gold);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
</style>
</head>

<header>

</header>
<div class="tagline-strip">Money &nbsp;·&nbsp; Meals &nbsp;·&nbsp; Me Time</div>

        <button class="pill" data-val="energized">Energized</button>
      </div>
    </div>
  </div>

  <!-- Dietary -->
  <div class="form-card">
    <span class="form-label">Dietary preference</span>
    <div class="pill-row" id="diet-group">
      <button class="pill on" data-val="none">No restrictions</button>
      <button class="pill" data-val="vegetarian">Vegetarian</button>
      <button class="pill" data-val="vegan">Vegan</button>
      <button class="pill" data-val="pescetarian">Pescetarian</button>
      <button class="pill" data-val="gluten-free">Gluten-free</button>
      <button class="pill" data-val="dairy-free">Dairy-free</button>
      <button class="pill" data-val="keto">Keto</button>
      <button class="pill" data-val="paleo">Paleo</button>
      <button class="pill" data-val="low-carb">Low carb</button>
      <button class="pill" data-val="high-protein">High protein</button>
      <button class="pill" data-val="nut-free">Nut-free</button>
    </div>
  </div>

  <!-- Goal + Budget -->
  <div class="grid-2">
    <div class="form-card">
      <span class="form-label">Nutrition goal</span>
      <div class="pill-row" id="goal-group">
        <button class="pill on" data-val="none">No goal</button>
        <button class="pill" data-val="weight-loss">Weight loss</button>
        <button class="pill" data-val="muscle">Muscle building</button>
        <button class="pill" data-val="low-sugar">Low sugar</button>
        <button class="pill" data-val="heart-healthy">Heart healthy</button>
        <button class="pill" data-val="energy">Energy boost</button>
      </div>
    </div>
    <div class="form-card">
      <span class="form-label">Budget per serving <span class="new-tag">New</span></span>
      <div class="pill-row" id="budget-group">
        <button class="pill on" data-val="any">No limit</button>
        <button class="pill" data-val="5">Under $5</button>
        <button class="pill" data-val="10">Under $10</button>
        <button class="pill" data-val="15">Under $15</button>
      </div>
    </div>
  </div>

  <button class="generate-btn" onclick="generate()">Generate my meal + grocery list →</button>

  <!-- Result -->
  <div id="result">
    <div id="result-inner"></div>
  </div>

</main>

<footer>© The Thriving Woman Reset™ &nbsp;·&nbsp; thethrivingwomanreset.com</footer>

<script>
// ── Pill setup ──────────────────────────────────────────────
function setupPills(id, multi) {
  var group = document.getElementById(id);
  group.querySelectorAll('.pill').forEach(function(p) {
    p.addEventListener('click', function() {
      if (!multi) group.querySelectorAll('.pill').forEach(function(x){ x.classList.remove('on'); });
      p.classList.toggle('on');
    });
  });
}
setupPills('time-group', false);
setupPills('energy-group', false);
setupPills('diet-group', false);
setupPills('goal-group', false);
setupPills('budget-group', false);

function getVal(id) {
  var el = document.querySelector('#' + id + ' .pill.on');
  return el ? el.dataset.val : null;
}

// ── Matching logic ──────────────────────────────────────────
function parseIngredients(raw) {
  return raw.toLowerCase().split(/[,\n]+/).map(function(s){ return s.trim(); }).filter(Boolean);
}

function scoreRecipe(recipe, userIngredients) {
  var score = 0;
  recipe.key.forEach(function(k) {
    var kWords = k.toLowerCase().split(' ');
    userIngredients.forEach(function(u) {
      var uWords = u.toLowerCase().split(' ');
      // Match only when a meaningful word (3+ chars) aligns between key and user input
      var matched = kWords.some(function(kw) {
        return uWords.some(function(uw) {
          return uw.length >= 3 && kw.length >= 3 && (kw === uw || kw.startsWith(uw) || uw.startsWith(kw));
        });
      });
      if (matched) score++;
    });
  });
  return score;
}

function topMatch(recipe, userIngredients) {
  // The recipe's first key ingredient (primary protein/base) must appear in user's list
  var primary = recipe.key[0].toLowerCase().split(' ');
  return userIngredients.some(function(u) {
    var uWords = u.toLowerCase().split(' ');
    return primary.some(function(pw) {
      return uWords.some(function(uw) {
        return uw.length >= 3 && pw.length >= 3 && (pw === uw || pw.startsWith(uw) || uw.startsWith(pw));
      });
    });
  });
}

function matchesDiet(recipe, diet) {
  if (!diet || diet === 'none') return true;
  return recipe.dietary.includes(diet);
}

function matchesTime(recipe, time) {
  if (!time) return true;
  return recipe.time <= parseInt(time);
}

// ── Generate ────────────────────────────────────────────────
function renderNoMatch(userIngredients) {
  var html = '<div class="no-match">' +
    '<p style="font-size:24px;margin-bottom:12px;">🥗</p>' +
    '<p style="font-weight:500;color:var(--navy);margin-bottom:8px;">We couldn\'t find a match for those ingredients.</p>' +
    '<p>We don\'t have a recipe built around <strong>' + userIngredients.join(', ') + '</strong> yet.</p>' +
    '<p style="margin-top:10px;">Try adding more common ingredients like <em>chicken, rice, eggs, spinach, garlic, or bell pepper</em> — or mix in a protein and we\'ll find something for you.</p>' +
    '<button class="generate-btn" style="margin-top:1.5rem;max-width:280px;" onclick="document.getElementById(\'ingredients\').value=\'\';document.getElementById(\'ingredients\').focus();document.getElementById(\'result\').classList.remove(\'show\')">Try different ingredients</button>' +
    '</div>';
  document.getElementById('result-inner').innerHTML = html;
  document.getElementById('result').classList.add('show');
  document.getElementById('result').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function generate() {
  var raw = document.getElementById('ingredients').value.trim();
  if (!raw) { document.getElementById('ingredients').focus(); return; }

  var userIngredients = parseIngredients(raw);
  var time = getVal('time-group');
  var diet = getVal('diet-group');

  // Filter by diet and time
  var candidates = RECIPES.filter(function(r){
    return matchesDiet(r, diet) && matchesTime(r, time);
  });

  // If no diet/time match, open up the pool
  if (!candidates.length) candidates = RECIPES.slice();

  // Score by how many key ingredients the user actually has
  var scored = candidates.map(function(r){
    return { recipe: r, score: scoreRecipe(r, userIngredients) };
  });

  // Require at least 2 matching ingredients, OR 1 match on the primary ingredient
  var strongMatches = scored.filter(function(s){ return s.score >= 2; });
  var weakMatches   = scored.filter(function(s){ return s.score >= 1 && topMatch(s.recipe, userIngredients); });
  var matches = strongMatches.length ? strongMatches : weakMatches;

  if (!matches.length) {
    renderNoMatch(userIngredients);
    return;
  }

  matches.sort(function(a, b){ return b.score - a.score; });
  renderResult(matches[0].recipe);
}

      '<button class="action-btn primary" onclick="generate()">Try another meal →</button>' +
    '</div>';

  window._needIds = needIds;
  document.getElementById('result-inner').innerHTML = html;
  var resultEl = document.getElementById('result');
  resultEl.classList.add('show');
  resultEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  updateProgress();
}

function updateList(cb) {
  var lbl = document.querySelector('label[for="' + cb.id + '"]');
  if (lbl) { cb.checked ? lbl.classList.add('done') : lbl.classList.remove('done'); }
  updateProgress();
}

function updateProgress() {
  var ids = window._needIds || [];
  var checked = ids.filter(function(id){ var el=document.getElementById(id); return el&&el.checked; }).length;
  var el = document.getElementById('progress');
  if (el) el.textContent = checked + ' of ' + ids.length + ' items checked';
}

function clearList() {
  document.querySelectorAll('.grocery-item input').forEach(function(cb){
    cb.checked = false;
    var lbl = document.querySelector('label[for="' + cb.id + '"]');
    if (lbl) lbl.classList.remove('done');
  });
  updateProgress();
}
</script>
</body>
</html>
<script>
function downloadPDF() { window.print(); }

function copyList() {
  var sections = document.querySelectorAll('.grocery-section');
  if (!sections.length) return;
  var text = '🛒 GROCERY LIST — The Thriving Woman Reset\n';
  text += 'thethrivingwomanreset.com/meal-generator\n';
  text += '─────────────────────────────────────────\n';
  sections.forEach(function(sec) {
    var title = sec.querySelector('.grocery-section-name');
    if (title) text += '\n' + title.textContent.toUpperCase() + '\n';
    sec.querySelectorAll('.grocery-item').forEach(function(item) {
      var lbl = item.querySelector('label');
      var badge = item.querySelector('.have-badge');
      if (lbl) text += (badge ? '  ✓ ' : '  ☐ ') + lbl.textContent.trim() + (badge ? ' (have this)' : '') + '\n';
    });
  });
  text += '\n─────────────────────────────────────────\n';
  text += 'Generated by TWR Fridge-to-Meal Generator\n';

  function showConfirm(msg) {
    var el = document.getElementById('copy-confirm');
    if (el) { el.textContent = msg; el.style.opacity = '1'; setTimeout(function(){ el.style.opacity = '0'; }, 4000); }
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() {
      showConfirm('✓ Grocery list copied! Paste it in Notes, Instacart, or iMessage.');
    }).catch(function() { fallback(text, showConfirm); });
  } else { fallback(text, showConfirm); }
}

function fallback(text, cb) {
  var ta = document.createElement('textarea');
  ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); cb('✓ Copied! Paste it anywhere you shop.'); }
  catch(e) { cb('Select the list manually to copy.'); }
  document.body.removeChild(ta);
}
</script>
